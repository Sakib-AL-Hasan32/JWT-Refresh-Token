services:
  db:
    image: mysql:8.4
    container_name: task-manager-db

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_manager_db
      MYSQL_USER: sakib
      MYSQL_PASSWORD: 12345

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: